<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thunai - Your Farming Companion</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <header>
            <nav class="navbar">
                <div class="container">
                    <a href="#" class="nav-logo" data-page="home">துணை | Thunai</a>
                    <ul class="nav-menu">
                        <li class="nav-item"><a href="#" class="nav-link active" data-page="home">Home</a></li>
                        <li class="nav-item"><a href="#" class="nav-link" data-page="crop-planner">Crop Planner</a></li>
                        <li class="nav-item"><a href="#" class="nav-link" data-page="crop-doctor">Crop Doctor</a></li>
                        <li class="nav-item"><a href="#" class="nav-link" data-page="market-prices">Market Prices</a></li>
                        <li class="nav-item"><a href="#" class="nav-link" data-page="knowledge-center">Knowledge Center</a></li>
                    </ul>
                    <div class="hamburger">
                        <span class="bar"></span>
                        <span class="bar"></span>
                        <span class="bar"></span>
                    </div>
                </div>
            </nav>
        </header>

        <!-- All page content will be dynamically loaded here -->
        <main id="app-content">
            <!-- Initial content will be loaded by app.js -->
        </main>

        <footer>
            <div class="container">
                <p>&copy; 2025 Thunai. All Rights Reserved.</p>
            </div>
        </footer>

        <!-- Thunai Assistant Chat Widget -->
        <div class="chat-widget">
            <div class="chat-header">
                <h4>துணை உதவியாளர்</h4>
                <button class="close-chat">&times;</button>
            </div>
            <div class="chat-body"><div class="chat-log"></div></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Ask a question...">
                <button id="send-btn">Send</button>
            </div>
        </div>
        <button class="chat-open-btn">
            <img src="https://i.ibb.co/L8yX2S8/chatbot-icon.png" alt="Chat Icon">
        </button>
    </div>

    <!-- JavaScript Files -->
    <script src="js/database.js"></script>
    <script src="js/app.js"></script>
    <script src="js/chatbot.js"></script>
</body>
</html>
